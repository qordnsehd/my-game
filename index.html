<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virus Shooter Final</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto;background:#050510;}
#ui{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 color:#fff;font-size:12px;
 background:rgba(0,0,0,0.7);
 padding:8px;border-radius:10px;
}
.overlay{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:#111;padding:20px;
 color:#fff;border:2px solid #0ff;
 display:none;
}
button{margin:5px;padding:10px;}
</style>
</head>
<body>

<div id="ui">
STAGE: <span id="stage">1</span> |
SCORE: <span id="score">0</span> |
COMBO: <span id="combo">0</span>
</div>

<div id="upgrade" class="overlay">
<h3>무기 선택</h3>
<button onclick="upgrade('machine')">⚡ 머신건</button>
<button onclick="upgrade('laser')">🔦 레이저</button>
<button onclick="upgrade('homing')">🎯 유도탄</button>
<button onclick="upgrade('all')">🔥 종합</button>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
c.width=480; c.height=800;

// ===== 음악 =====
const bgMusic=new Audio('music.mp3');
bgMusic.loop=true;
bgMusic.volume=0.3;
let started=false;

function startAudio(){
 if(!started){
  bgMusic.play().catch(()=>{});
  audioCtx.resume();
  started=true;
 }
}

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

// ===== 플레이어 =====
let player={
 x:240,y:700,hp:100,
 shield:0
};

// ===== 상태 =====
let bullets=[],enemies=[],eBullets=[],items=[];
let kills=0,score=0,combo=0,lastKill=0;

// ===== 무기 =====
let weapon={
 type:'normal',
 level:{machine:0,laser:0,homing:0}
};

// ===== 입력 =====
c.addEventListener('mousedown',e=>{
 startAudio();
 shooting=true;
 move(e);
});
window.addEventListener('mousemove',e=>shooting&&move(e));
window.addEventListener('mouseup',()=>shooting=false);

let shooting=false;
function move(e){
 const r=c.getBoundingClientRect();
 player.x=e.clientX-r.left;
 player.y=e.clientY-r.top;
}

// ===== 코로나 그리기 =====
function drawVirus(x,y,r){
 ctx.strokeStyle='#0f0';
 for(let i=0;i<10;i++){
  let a=Math.PI*2/10*i;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+Math.cos(a)*(r+10),y+Math.sin(a)*(r+10));
  ctx.stroke();
 }
 ctx.beginPath();
 ctx.arc(x,y,r,0,Math.PI*2);
 ctx.fillStyle='#0a0';
 ctx.fill();
}

// ===== 총 =====
let lastShot=0;
function shoot(){
 let now=Date.now();
 let speed=300/(weapon.level.machine+1);

 if(now-lastShot>speed){
  bullets.push({x:player.x,y:player.y,type:'normal'});
  
  if(weapon.level.laser>0){
   bullets.push({x:player.x,y:player.y,type:'laser'});
  }

  if(weapon.level.homing>0){
   bullets.push({x:player.x,y:player.y,type:'homing'});
  }

  lastShot=now;
 }
}

// ===== 적 =====
function spawnEnemy(){
 enemies.push({
  x:Math.random()*440+20,
  y:-20,
  r:20,
  hp:2,
  lastShoot:0
 });
}

// ===== 아이템 =====
function spawnItem(x,y){
 items.push({x,y,type:'shield'});
}

// ===== 업그레이드 =====
function upgrade(t){
 if(t==='all'){
  weapon.level.machine++;
  weapon.level.laser++;
  weapon.level.homing++;
 }else{
  weapon.level[t]++;
 }
 document.getElementById('upgrade').style.display='none';
}

// ===== 업데이트 =====
function update(){
 if(shooting) shoot();

 if(Math.random()<0.02) spawnEnemy();

 // 50킬 업그레이드
 if(kills>0 && kills%50===0){
  document.getElementById('upgrade').style.display='block';
  kills++;
 }

 // 20킬 아이템
 if(kills>0 && kills%20===0){
  spawnItem(player.x,0);
  kills++;
 }

 bullets.forEach((b,bi)=>{
  b.y-=10;

  enemies.forEach((e,ei)=>{
   if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){

    let crit=Math.random()<0.15;
    let dmg=crit?2:1;
    e.hp-=dmg;

    if(e.hp<=0){
     let now=Date.now();
     combo=(now-lastKill<1500)?combo+1:1;
     lastKill=now;

     score+=100+combo*10;
     kills++;

     enemies.splice(ei,1);
    }
    bullets.splice(bi,1);
   }
  });
 });

 // 적
 enemies.forEach(e=>{
  e.y+=2;

  if(Date.now()-e.lastShoot>1000){
   eBullets.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*2,vy:4});
   e.lastShoot=Date.now();
  }
 });

 // 적탄
 eBullets.forEach((b,bi)=>{
  b.x+=b.vx;
  b.y+=b.vy;

  if(Math.hypot(b.x-player.x,b.y-player.y)<15){
   if(player.shield>0){
    player.shield--;
   }else{
    player.hp-=5;
   }
   eBullets.splice(bi,1);
  }
 });

 // 아이템
 items.forEach((it,ii)=>{
  it.y+=2;
  if(Math.hypot(it.x-player.x,it.y-player.y)<20){
   player.shield=5;
   items.splice(ii,1);
  }
 });

 document.getElementById('score').innerText=score;
 document.getElementById('combo').innerText=combo;
}

// ===== 그리기 =====
function draw(){
 ctx.clearRect(0,0,480,800);

 // 플레이어
 ctx.fillStyle='cyan';
 ctx.beginPath();
 ctx.moveTo(player.x,player.y-10);
 ctx.lineTo(player.x+10,player.y+10);
 ctx.lineTo(player.x-10,player.y+10);
 ctx.fill();

 // 방어막
 if(player.shield>0){
  ctx.strokeStyle='#0ff';
  ctx.beginPath();
  ctx.arc(player.x,player.y,25,0,Math.PI*2);
  ctx.stroke();
 }

 bullets.forEach(b=>{
  ctx.fillStyle=b.type==='laser'?'#f0f':'#ff0';
  ctx.fillRect(b.x,b.y,4,10);
 });

 enemies.forEach(e=>{
  drawVirus(e.x,e.y,e.r);
 });

 eBullets.forEach(b=>{
  ctx.fillStyle='red';
  ctx.beginPath();
  ctx.arc(b.x,b.y,4,0,Math.PI*2);
  ctx.fill();
 });

 items.forEach(it=>{
  ctx.fillStyle='#0af';
  ctx.beginPath();
  ctx.arc(it.x,it.y,10,0,Math.PI*2);
  ctx.fill();
 });
}

// ===== 루프 =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
