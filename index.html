<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virus Shooter - Pro Update</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        canvas { display: block; background: #050505; border: 2px solid #333; box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); max-width: 100%; max-height: 100vh; cursor: crosshair; }
        #ui { position: absolute; top: 20px; width: 90%; max-width: 440px; pointer-events: none; display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; z-index: 10; font-size: 14px; }
        #upgrade-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 30px; border: 3px solid #8a2be2; display: none; text-align: center; z-index: 100; border-radius: 15px; width: 80%; max-width: 350px; }
        .btn-container { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn-box { flex: 1; margin: 5px; }
        button { background: #8a2be2; color: white; border: none; padding: 15px 10px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .key-hint { font-size: 12px; color: #aaa; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div>ST <span id="stage-txt">1</span> | SC: <span id="score-txt">0</span></div>
        <div>KILLS: <span id="kill-txt">0</span>/100</div>
        <div>BOMB(X): <span id="bomb-txt">0</span></div>
    </div>
    
    <div id="upgrade-menu">
        <h2 style="color:#8a2be2; margin: 0;">무기 업그레이드!</h2>
        <p style="font-size: 14px;">방향키 또는 버튼으로 선택하세요</p>
        <div class="btn-container">
            <div class="btn-box">
                <button onclick="applyUpgrade('MachineGun')">🚀 머신건</button>
                <span class="key-hint">(왼쪽 방향키)</span>
            </div>
            <div class="btn-box">
                <button onclick="applyUpgrade('Laser')">⚡ 레이저</button>
                <span class="key-hint">(오른쪽 방향키)</span>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 480; canvas.height = 800;

let stage = 1, score = 0, kills = 0, totalKillsForBomb = 0, bombs = 0, activeItems = [];
let weaponType = 'Normal', weaponTimer = 0, isPaused = false, gameOver = false, isShooting = false;
let player = { x: 225, y: 720, w: 30, h: 35, speed: 8 };
let bullets = [], enemies = [];

let keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'KeyX') useBomb();
    
    // 업그레이드 메뉴 열렸을 때 방향키 선택 로직
    if (isPaused) {
        if (e.code === 'ArrowLeft') applyUpgrade('MachineGun');
        if (e.code === 'ArrowRight') applyUpgrade('Laser');
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function handleMove(clientX) {
    const rect = canvas.getBoundingClientRect();
    player.x = (clientX - rect.left) * (canvas.width / rect.width) - player.w / 2;
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
}
canvas.addEventListener('mousemove', e => handleMove(e.clientX));
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive: false});
canvas.addEventListener('touchstart', () => { if(!gameOver) isShooting = true; }, {passive: false});
canvas.addEventListener('touchend', () => isShooting = false);

function spawnEnemy(isBoss = false) {
    enemies.push({
        x: Math.random() * (canvas.width - 50), y: -60,
        w: isBoss ? 120 : 40, h: isBoss ? 120 : 40,
        hp: isBoss ? 30 + (stage * 20) : 1, maxHp: isBoss ? 30 + (stage * 20) : 1,
        speed: isBoss ? 1.2 : 2 + (stage * 0.4), isBoss: isBoss,
        color: `hsl(${Math.random() * 60 + 100}, 100%, 50%)`
    });
}

function shoot() {
    const now = Date.now();
    let delay = weaponType === 'MachineGun' ? 100 : (weaponType === 'Laser' ? 600 : 350);
    if (now - (player.lastShot || 0) > delay) {
        if (weaponType === 'Laser') bullets.push({ x: player.x - 10, y: player.y - 20, w: 50, h: 30, type: 'laser' });
        else bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 15, type: 'normal' });
        player.lastShot = now;
    }
}

function applyUpgrade(type) {
    weaponType = type;
    weaponTimer = 20;
    isPaused = false;
    document.getElementById('upgrade-menu').style.display = 'none';
    keys = {}; // 선택 후 기체 급발진 방지
}

function useBomb() {
    if (bombs > 0 && !isPaused) {
        bombs--; enemies = []; score += 500;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,canvas.width, canvas.height);
    }
}

function update() {
    if (isPaused || gameOver) return;
    if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
    if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
    if (keys['Space'] || isShooting) shoot();
    if (weaponTimer > 0) { weaponTimer -= 1/60; if (weaponTimer <= 0) weaponType = 'Normal'; }

    if (Math.random() < 0.025 + (stage * 0.005) && kills < 100) {
        if ((kills === 50 || kills === 99) && !enemies.some(e => e.isBoss)) spawnEnemy(true);
        else if (enemies.length < 5 + stage && !enemies.some(e => e.isBoss)) spawnEnemy(false);
    }

    bullets.forEach((b, bi) => {
        b.y -= 12;
        if (b.y < -30) bullets.splice(bi, 1);
        enemies.forEach((e, ei) => {
            if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                e.hp -= (b.type === 'laser' ? 5 : 1);
                if (b.type !== 'laser') bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    enemies.splice(ei, 1);
                    kills++; totalKillsForBomb++; score += e.isBoss ? 1000 : 100;
                    if (totalKillsForBomb >= 10) { if (activeItems.length < 2) activeItems.push({ x: e.x, y: e.y, w: 25, h: 25 }); totalKillsForBomb = 0; }
                    if (kills > 0 && kills % 20 === 0 && kills < 100) { isPaused = true; document.getElementById('upgrade-menu').style.display = 'block'; }
                    if (kills >= 100) { stage++; kills = 0; }
                }
            }
        });
    });

    enemies.forEach((e, i) => {
        e.y += e.speed;
        if (e.y > canvas.height) enemies.splice(i, 1);
        if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) gameOver = true;
    });

    activeItems.forEach((item, i) => {
        item.y += 4;
        if (player.x < item.x + item.w && player.x + player.w > item.x && player.y < item.y + item.h && player.y + player.h > item.y) { bombs++; activeItems.splice(i, 1); }
    });

    document.getElementById('stage-txt').innerText = stage;
    document.getElementById('score-txt').innerText = score;
    document.getElementById('kill-txt').innerText = kills;
    document.getElementById('bomb-txt').innerText = bombs;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.shadowBlur = 15; ctx.shadowColor = "#8a2be2"; ctx.fillStyle = '#8a2be2';
    ctx.beginPath(); ctx.moveTo(player.x + player.w/2, player.y); ctx.lineTo(player.x + player.w, player.y + player.h); ctx.lineTo(player.x, player.y + player.h); ctx.fill();
    ctx.shadowBlur = 0;
    enemies.forEach(e => {
        ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI*2); ctx.fill();
        if (e.isBoss) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y - 15, (e.hp/e.maxHp)*e.w, 8); }
    });
    bullets.forEach(b => { ctx.fillStyle = b.type === 'laser' ? '#00ffff' : '#fff'; ctx.fillRect(b.x, b.y, b.w, b.h); });
    activeItems.forEach(item => { ctx.fillStyle = '#ffff00'; ctx.fillRect(item.x, item.y, item.w, item.h); ctx.fillStyle = '#000'; ctx.font = 'bold 16px Arial'; ctx.fillText('B', item.x+6, item.y+18); });
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = 'white'; ctx.font = 'bold 40px Arial'; ctx.textAlign = "center";
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
        ctx.font = '20px Arial'; ctx.fillText('새로고침하여 다시 시작', canvas.width/2, canvas.height/2 + 50);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
