<!DOCTYPE html>
<html>
<head>
    <title>Virus Shooter - Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: 'Malgun Gothic', sans-serif; }
        canvas { display: block; margin: 0 auto; background: #050505; border: 2px solid #333; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 480px; pointer-events: none; display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 5px; }
        #upgrade-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 30px; border: 3px solid #8a2be2;
            display: none; text-align: center; z-index: 100; border-radius: 15px;
        }
        button { background: #8a2be2; color: white; border: none; padding: 15px 30px; margin: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; }
        button:hover { background: #a04ef6; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="ui">
        <div>ST <span id="stage-txt">1</span> | SC: <span id="score-txt">0</span></div>
        <div>KILLS: <span id="kill-txt">0</span>/100</div>
        <div>BOMB(X): <span id="bomb-txt">0</span></div>
    </div>
    
    <div id="upgrade-menu">
        <h2 style="color:#8a2be2">무기 업그레이드!</h2>
        <p>20초 동안 유지될 무기를 선택하세요</p>
        <button onclick="applyUpgrade('MachineGun')">머신건 (고속 연사)</button>
        <button onclick="applyUpgrade('Laser')">메가 레이저 (광범위)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 480; canvas.height = 720;

// 게임 상태 관리
let stage = 1, score = 0, kills = 0, totalKillsForBomb = 0;
let bombs = 0, activeItems = [];
let weaponType = 'Normal', weaponTimer = 0;
let isPaused = false, gameOver = false;

// 기체 및 데이터
let player = { x: 240, y: 650, w: 30, h: 35, speed: 7 };
let bullets = [], enemies = [];

// 입력 감지 (키보드 + 마우스)
let keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'KeyX') useBomb(); // X키로 폭탄 즉시 사용
});
window.addEventListener('keyup', e => keys[e.code] = false);

// 마우스/터치 이동 처리
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    player.x = (e.clientX - rect.left) - player.w / 2;
    // 경계 제한
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
});

function spawnEnemy(isBoss = false) {
    enemies.push({
        x: Math.random() * (canvas.width - 50),
        y: -60,
        w: isBoss ? 100 : 35,
        h: isBoss ? 100 : 35,
        hp: isBoss ? 25 + (stage * 15) : 1,
        maxHp: isBoss ? 25 + (stage * 15) : 1,
        speed: isBoss ? 1 : 1.5 + (stage * 0.3),
        isBoss: isBoss,
        color: `hsl(${Math.random() * 60 + 100}, 100%, 50%)` // 형광 바이러스색
    });
}

function shoot() {
    const now = Date.now();
    let delay = weaponType === 'MachineGun' ? 100 : (weaponType === 'Laser' ? 600 : 350);
    
    if (now - (player.lastShot || 0) > delay) {
        if (weaponType === 'Laser') {
            bullets.push({ x: player.x - 10, y: player.y - 10, w: 50, h: 20, type: 'laser' });
        } else {
            bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 15, type: 'normal' });
        }
        player.lastShot = now;
    }
}

function applyUpgrade(type) {
    weaponType = type;
    weaponTimer = 20;
    document.getElementById('upgrade-menu').style.display = 'none';
    isPaused = false;
}

function useBomb() {
    if (bombs > 0 && !isPaused) {
        bombs--;
        enemies = []; // 화면 적 소멸
        score += 500;
        // 폭탄 이펙트
        ctx.fillStyle = "white";
        ctx.fillRect(0,0,canvas.width, canvas.height);
    }
}

function update() {
    if (isPaused || gameOver) return;

    // 키보드 이동
    if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
    if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
    if (keys['Space']) shoot();

    // 무기 타이머
    if (weaponTimer > 0) {
        weaponTimer -= 1/60;
        if (weaponTimer <= 0) weaponType = 'Normal';
    }

    // 적 생성 (50킬, 100킬 보스)
    if (Math.random() < 0.02 + (stage * 0.005) && kills < 100) {
        if ((kills === 50 || kills === 99) && !enemies.some(e => e.isBoss)) {
            spawnEnemy(true);
        } else if (enemies.length < 6 + stage && !enemies.some(e => e.isBoss)) {
            spawnEnemy(false);
        }
    }

    // 총알 및 충돌 처리
    bullets.forEach((b, bi) => {
        b.y -= 10;
        if (b.y < -20) bullets.splice(bi, 1);
        
        enemies.forEach((e, ei) => {
            if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                e.hp -= (b.type === 'laser' ? 5 : 1);
                if (b.type !== 'laser') bullets.splice(bi, 1);
                
                if (e.hp <= 0) {
                    enemies.splice(ei, 1);
                    kills++; totalKillsForBomb++; score += e.isBoss ? 1000 : 100;
                    
                    // 폭탄 아이템 드롭 (10킬마다, 화면에 2개 제한)
                    if (totalKillsForBomb >= 10) {
                        if (activeItems.length < 2) activeItems.push({ x: e.x, y: e.y, w: 20, h: 20 });
                        totalKillsForBomb = 0;
                    }
                    // 업그레이드 선택창 (20킬마다)
                    if (kills > 0 && kills % 20 === 0 && kills < 100) {
                        isPaused = true;
                        document.getElementById('upgrade-menu').style.display = 'block';
                    }
                    // 스테이지 클리어
                    if (kills >= 100) { stage++; kills = 0; }
                }
            }
        });
    });

    enemies.forEach((e, i) => {
        e.y += e.speed;
        if (e.y > canvas.height) enemies.splice(i, 1);
        if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) gameOver = true;
    });

    activeItems.forEach((item, i) => {
        item.y += 3;
        if (player.x < item.x + item.w && player.x + player.w > item.x && player.y < item.y + item.h && player.y + player.h > item.y) {
            bombs++; activeItems.splice(i, 1);
        }
    });

    // UI 업데이트
    document.getElementById('stage-txt').innerText = stage;
    document.getElementById('score-txt').innerText = score;
    document.getElementById('kill-txt').innerText = kills;
    document.getElementById('bomb-txt').innerText = bombs;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 플레이어 (보라색 비행체)
    ctx.shadowBlur = 10; ctx.shadowColor = "#8a2be2";
    ctx.fillStyle = '#8a2be2';
    ctx.beginPath();
    ctx.moveTo(player.x + player.w/2, player.y);
    ctx.lineTo(player.x + player.w, player.y + player.h);
    ctx.lineTo(player.x, player.y + player.h);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 적 (형광 바이러스)
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI*2);
        ctx.fill();
        if (e.isBoss) {
            ctx.strokeStyle = 'red'; ctx.lineWidth = 4; ctx.stroke();
            // 보스 체력바
            ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y - 10, (e.hp/e.maxHp)*e.w, 5);
        }
    });

    // 무기/아이템
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'laser' ? '#00ffff' : '#fff';
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    activeItems.forEach(item => {
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(item.x, item.y, item.w, item.h);
        ctx.fillStyle = '#000'; ctx.font = 'bold 14px Arial'; ctx.fillText('B', item.x+4, item.y+15);
    });

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = 'white'; ctx.font = '40px Arial'; ctx.fillText('GAME OVER', 130, 360);
        ctx.font = '20px Arial'; ctx.fillText('Press F5 to Restart', 160, 400);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
