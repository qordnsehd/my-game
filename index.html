<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virus Shooter - Cody Blog Edition</title>
    <style>
        /* 블로그 본문 안에서 잘리지 않도록 body와 html 설정을 최소화 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* 컨테이너를 만들어 화면에 중앙 배치 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 캔버스가 비율을 유지하며 부모 요소에 꽉 차도록 설정 */
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 비율 유지하며 꽉 채움 */
            background: linear-gradient(to bottom, #050505, #110022);
            border: 1px solid #444;
            cursor: crosshair;
        }
        
        #ui { position: absolute; top: 10px; width: 85%; max-width: 400px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; z-index: 10; border: 1px solid #8a2be2; font-family: sans-serif; }
        .ui-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; color: #fff; }
        #hp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #00ff00); transition: width 0.2s; }
        
        #bomb-btn { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; background: rgba(255, 0, 0, 0.6); border: 2px solid #ff0000; border-radius: 50%; color: white; font-weight: bold; font-size: 12px; cursor: pointer; z-index: 20; display: flex; justify-content: center; align-items: center; }
        
        #upgrade-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,0,20,0.95); padding: 20px; border: 2px solid #00ffff; display: none; text-align: center; z-index: 100; border-radius: 15px; width: 70%; max-width: 300px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { background: #1a1a1a; color: #00ffff; border: 1px solid #00ffff; padding: 10px; cursor: pointer; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div class="ui-top">
                <div>STAGE: <span id="stage-txt">1</span> | BOMB: <span id="bomb-txt-ui">3</span></div>
                <div>AMMO: <span id="ammo-txt">∞</span></div>
            </div>
            <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
        </div>
        
        <div id="bomb-btn" onmousedown="triggerMegaBomb()" ontouchstart="triggerMegaBomb()">BOMB</div>

        <div id="upgrade-menu">
            <h2 style="color:#00ffff; margin: 0; font-size: 18px;">UPGRADE</h2>
            <div class="btn-grid">
                <button onclick="applyUpgrade('MachineGun')">⚡ 머신건</button>
                <button onclick="applyUpgrade('Laser')">🔦 레이저</button>
                <button onclick="applyUpgrade('Homing')" style="grid-column: 1 / -1;">🎯 유도 미사일</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 게임 내부 논리 좌표는 고정 (계산 편의성)
const GAME_W = 480;
const GAME_H = 800;
canvas.width = GAME_W;
canvas.height = GAME_H;

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'shoot') { osc.frequency.setValueAtTime(500, now); gain.gain.setValueAtTime(0.02, now); osc.stop(now+0.1); }
    else if (type === 'exp') { osc.frequency.setValueAtTime(100, now); gain.gain.setValueAtTime(0.05, now); osc.stop(now+0.2); }
    osc.start();
}

let stage = 1, kills = 0, bombInventory = 3, armorTimer = 0, armorActive = false;
let weaponType = 'Normal', ammo = 0, isPaused = false, gameOver = false, isShooting = false;
let stars = Array.from({length: 30}, () => ({x: Math.random()*GAME_W, y: Math.random()*GAME_H, s: Math.random()*2+1}));
let player = { x: 225, y: 700, w: 34, h: 40, hp: 100, maxHp: 100, lastShot: 0 };
let bullets = [], enemyBullets = [], enemies = [], activeItems = [], keys = {};

function spawnEnemy(isBoss = false) {
    const size = isBoss ? 70 : 25;
    const hp = isBoss ? 50 + (stage * 20) : 1 + Math.floor(stage/3);
    enemies.push({
        x: size + Math.random() * (GAME_W - size * 2), y: -100,
        r: size, hp: hp, maxHp: hp, speedY: isBoss ? 0.5 : 1.5 + (stage * 0.2),
        sinMod: Math.random() * 2, isBoss: isBoss, lastShot: 0, shootInterval: isBoss ? 800 : 2500,
        color: isBoss ? '#ff0055' : `hsl(${180 + Math.random() * 60}, 80%, 50%)`
    });
}

function shoot() {
    const now = Date.now();
    let delay = weaponType === 'MachineGun' ? 80 : (weaponType === 'Laser' ? 500 : 300);
    if (now - player.lastShot > delay) {
        if (weaponType === 'Laser') bullets.push({ x: player.x-8, y: player.y-40, w: 50, h: 40, type: 'laser' });
        else bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 18, type: 'normal' });
        if(weaponType !== 'Normal') { ammo--; if(ammo<=0) weaponType='Normal'; }
        player.lastShot = now; playSound('shoot');
    }
}

function triggerMegaBomb() {
    if (bombInventory > 0 && !gameOver) {
        bombInventory--; 
        enemies.forEach(e => { e.hp -= 50; if(e.hp<=0) kills++; });
        enemies = enemies.filter(e => e.hp > 0);
        enemyBullets = [];
        playSound('exp');
    }
}

function applyUpgrade(type) { weaponType = type; ammo = 60; isPaused = false; document.getElementById('upgrade-menu').style.display = 'none'; }

function update() {
    if (isPaused || gameOver) return;
    if (isShooting) shoot();
    if (armorTimer > 0) { armorTimer -= 1/60; if (armorTimer <= 0) armorActive = false; }
    if (Math.random() < 0.02) {
        if (kills >= 30 && !enemies.some(e => e.isBoss)) spawnEnemy(true);
        else if (enemies.length < 5) spawnEnemy(false);
    }
    enemies.forEach((e, ei) => {
        e.y += e.speedY; 
        if (e.y > GAME_H + 100) enemies.splice(ei, 1);
        if (Math.hypot(e.x - (player.x + 17), e.y - (player.y + 20)) < e.r + 15) {
            if(!armorActive) player.hp -= 20;
            enemies.splice(ei, 1);
        }
    });
    enemyBullets.forEach((eb, ebi) => {
        eb.y += 7;
        if (eb.x < player.x + player.w && eb.x + eb.w > player.x && eb.y < player.y + player.h && eb.y + eb.h > player.y) {
            enemyBullets.splice(ebi, 1); if(!armorActive) player.hp -= 10;
        }
    });
    bullets.forEach((b, bi) => {
        b.y -= 12;
        enemies.forEach((e, ei) => {
            if (b.x < e.x+e.r && b.x+b.w > e.x-e.r && b.y < e.y+e.r && b.y+b.h > e.y-e.r) {
                e.hp -= 1; bullets.splice(bi, 1);
                if (e.hp <= 0) { 
                    enemies.splice(ei, 1); kills++; 
                    if (kills % 25 === 0) { isPaused = true; document.getElementById('upgrade-menu').style.display = 'block'; }
                }
            }
        });
    });
    if (player.hp <= 0) gameOver = true;
    document.getElementById('hp-bar-fill').style.width = player.hp + "%";
    document.getElementById('stage-txt').innerText = stage;
    document.getElementById('bomb-txt-ui').innerText = bombInventory;
    document.getElementById('ammo-txt').innerText = (weaponType === 'Normal') ? '∞' : ammo;
}

function draw() {
    ctx.clearRect(0, 0, GAME_W, GAME_H);
    ctx.fillStyle = '#fff';
    stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); s.y += 0.5; if(s.y > GAME_H) s.y = 0; });
    
    // 기체
    const hue = (180 + (stage * 40)) % 360;
    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
    ctx.beginPath(); ctx.moveTo(player.x + 17, player.y); ctx.lineTo(player.x + 34, player.y + 40); ctx.lineTo(player.x, player.y + 40); ctx.fill();

    enemies.forEach(e => {
        ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    });
    bullets.forEach(b => { ctx.fillStyle = '#0ff'; ctx.fillRect(b.x, b.y, b.w, b.h); });
    enemyBullets.forEach(eb => { ctx.fillStyle = '#f33'; ctx.fillRect(eb.x, eb.y, eb.w, eb.h); });

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,GAME_W, GAME_H);
        ctx.fillStyle = 'red'; ctx.font = '30px Arial'; ctx.textAlign='center';
        ctx.fillText('GAME OVER', GAME_W/2, GAME_H/2);
    }
}

// 중요: 터치/마우스 좌표를 캔버스 크기에 맞춰 보정하는 함수
function handleMove(e) {
    e.preventDefault();
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const scaleX = GAME_W / rect.width;
    const scaleY = GAME_H / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    player.x = (clientX - rect.left) * scaleX - player.w / 2;
    player.y = (clientY - rect.top) * scaleY - player.h / 2;
}

canvas.addEventListener('mousedown', (e) => { if(gameOver) location.reload(); isShooting = true; handleMove(e); });
window.addEventListener('mousemove', (e) => { if(isShooting) handleMove(e); });
window.addEventListener('mouseup', () => isShooting = false);
canvas.addEventListener('touchstart', (e) => { if(gameOver) location.reload(); isShooting = true; handleMove(e); }, {passive: false});
canvas.addEventListener('touchmove', handleMove, {passive: false});
canvas.addEventListener('touchend', () => isShooting = false);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
