<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virus Shooter - Cody Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: linear-gradient(to bottom, #050505, #110022);
            border: 1px solid #444;
            touch-action: none; /* 브라우저 기본 스크롤 방지 */
        }
        #ui { position: absolute; top: 10px; width: 85%; max-width: 400px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; z-index: 10; border: 1px solid #8a2be2; color: #fff; font-family: sans-serif; }
        .ui-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        #hp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #00ff00); transition: width 0.2s; }
        #bomb-btn { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; background: rgba(255, 0, 0, 0.6); border: 2px solid #ff0000; border-radius: 50%; color: white; font-weight: bold; font-size: 12px; cursor: pointer; z-index: 20; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        #upgrade-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,0,20,0.95); padding: 20px; border: 2px solid #00ffff; display: none; text-align: center; z-index: 100; border-radius: 15px; width: 70%; max-width: 300px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { background: #1a1a1a; color: #00ffff; border: 1px solid #00ffff; padding: 10px; cursor: pointer; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div class="ui-top">
                <div>STAGE: <span id="stage-txt">1</span> | BOMB: <span id="bomb-txt-ui">3</span></div>
                <div>AMMO: <span id="ammo-txt">∞</span></div>
            </div>
            <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
        </div>
        <div id="bomb-btn" onmousedown="triggerMegaBomb()" ontouchstart="triggerMegaBomb()">BOMB</div>
        <div id="upgrade-menu">
            <h2 style="color:#00ffff; margin: 0; font-size: 18px;">UPGRADE</h2>
            <div class="btn-grid">
                <button onclick="applyUpgrade('MachineGun')">⚡ 머신건</button>
                <button onclick="applyUpgrade('Laser')">🔦 레이저</button>
                <button onclick="applyUpgrade('Homing')" style="grid-column: 1 / -1;">🎯 유도 미사일</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GAME_W = 480;
const GAME_H = 800;
canvas.width = GAME_W;
canvas.height = GAME_H;

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

let stage = 1, kills = 0, bombInventory = 3, armorActive = false;
let weaponType = 'Normal', ammo = 0, isPaused = false, gameOver = false, isShooting = false;
let stars = Array.from({length: 30}, () => ({x: Math.random()*GAME_W, y: Math.random()*GAME_H, s: Math.random()*2+1}));
let player = { x: 225, y: 700, w: 34, h: 40, hp: 100, maxHp: 100, lastShot: 0 };
let bullets = [], enemies = [], enemyBullets = [], activeItems = [];

function spawnEnemy(isBoss = false) {
    const size = isBoss ? 70 : 25;
    const hp = isBoss ? 50 + (stage * 20) : 1;
    enemies.push({
        x: size + Math.random() * (GAME_W - size * 2), y: -100,
        r: size, hp: hp, maxHp: hp, speedY: isBoss ? 0.5 : 2 + (stage * 0.2),
        color: isBoss ? '#ff0055' : `hsl(${180 + Math.random() * 60}, 80%, 50%)`, isBoss: isBoss
    });
}

function shoot() {
    const now = Date.now();
    let delay = weaponType === 'MachineGun' ? 80 : 300;
    if (now - player.lastShot > delay) {
        bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 18 });
        player.lastShot = now;
        if(weaponType !== 'Normal') { ammo--; if(ammo<=0) weaponType='Normal'; }
    }
}

function triggerMegaBomb() {
    if (bombInventory > 0 && !gameOver) {
        bombInventory--; 
        enemies = []; enemyBullets = [];
        document.getElementById('bomb-txt-ui').innerText = bombInventory;
    }
}

function applyUpgrade(type) { weaponType = type; ammo = 60; isPaused = false; document.getElementById('upgrade-menu').style.display = 'none'; }

function update() {
    if (isPaused || gameOver) return;
    if (isShooting) shoot();
    if (Math.random() < 0.02) spawnEnemy(false);
    
    enemies.forEach((e, ei) => {
        e.y += e.speedY;
        if (e.y > GAME_H) enemies.splice(ei, 1);
        if (Math.hypot(e.x - (player.x + 17), e.y - (player.y + 20)) < e.r + 15) {
            player.hp -= 20; enemies.splice(ei, 1);
        }
    });

    bullets.forEach((b, bi) => {
        b.y -= 15;
        if (b.y < -20) bullets.splice(bi, 1);
        enemies.forEach((e, ei) => {
            if (b.x < e.x + e.r && b.x + b.w > e.x - e.r && b.y < e.y + e.r && b.y + b.h > e.y - e.r) {
                e.hp--; bullets.splice(bi, 1);
                if (e.hp <= 0) { enemies.splice(ei, 1); kills++; }
            }
        });
    });

    if (kills > 0 && kills % 25 === 0) { kills++; isPaused = true; document.getElementById('upgrade-menu').style.display = 'block'; }
    if (player.hp <= 0) gameOver = true;
    document.getElementById('hp-bar-fill').style.width = player.hp + "%";
}

function draw() {
    ctx.clearRect(0, 0, GAME_W, GAME_H);
    ctx.fillStyle = '#fff';
    stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); s.y += 0.5; if(s.y > GAME_H) s.y = 0; });
    
    ctx.fillStyle = '#00ffff';
    ctx.beginPath(); ctx.moveTo(player.x + 17, player.y); ctx.lineTo(player.x + 34, player.y + 40); ctx.lineTo(player.x, player.y + 40); ctx.fill();

    enemies.forEach(e => { ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill(); });
    bullets.forEach(b => { ctx.fillStyle = '#ff0'; ctx.fillRect(b.x, b.y, b.w, b.h); });

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,GAME_W, GAME_H);
        ctx.fillStyle = 'red'; ctx.font = '30px Arial'; ctx.textAlign='center';
        ctx.fillText('MISSION FAILED', GAME_W/2, GAME_H/2);
    }
}

// 좌표 보정 로직 수정
function handleInput(e) {
    if (gameOver || isPaused) return;
    initAudio();
    const rect = canvas.getBoundingClientRect();
    
    // 실제 화면 대비 게임 좌표 비율 계산
    const scaleX = GAME_W / rect.width;
    const scaleY = GAME_H / rect.height;
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    // 계산된 좌표를 기체 중앙으로 설정
    player.x = (clientX - rect.left) * scaleX - player.w / 2;
    player.y = (clientY - rect.top) * scaleY - player.h / 2;
    
    // 화면 밖으로 나가지 않게 제한
    player.x = Math.max(0, Math.min(GAME_W - player.w, player.x));
    player.y = Math.max(0, Math.min(GAME_H - player.h, player.y));
}

// 이벤트 리스너 통합 및 최적화
canvas.addEventListener('mousedown', (e) => { if(gameOver) location.reload(); isShooting = true; handleInput(e); });
window.addEventListener('mousemove', (e) => { if(isShooting) handleInput(e); });
window.addEventListener('mouseup', () => isShooting = false);

canvas.addEventListener('touchstart', (e) => { 
    if(gameOver) location.reload(); 
    isShooting = true; 
    handleInput(e); 
}, {passive: false});
canvas.addEventListener('touchmove', (e) => { 
    e.preventDefault(); // 스크롤 방지
    handleInput(e); 
}, {passive: false});
canvas.addEventListener('touchend', () => isShooting = false);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
