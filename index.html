<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virus Shooter - Cody Ultimate</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000 !important; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; background: linear-gradient(to bottom, #050505, #110022); border: 1px solid #444; touch-action: none; }
        
        /* UI 및 버튼 설정 */
        #ui { position: absolute; top: 10px; width: 90%; max-width: 440px; pointer-events: none; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 10px; z-index: 10; border: 1px solid #8a2be2; color: #fff; font-family: sans-serif; }
        .ui-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        #hp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #00ff00); transition: width 0.2s; }
        
        .mobile-btn { position: absolute; width: 60px; height: 60px; border-radius: 50%; color: white; font-weight: bold; font-size: 11px; cursor: pointer; z-index: 20; display: none; justify-content: center; align-items: center; border: 2px solid #fff; pointer-events: auto; }
        @media screen and (max-width: 1024px) { .mobile-btn { display: flex; } }
        #bomb-btn { bottom: 20px; right: 20px; background: rgba(255, 0, 0, 0.6); border-color: #ff0000; }
        #pause-btn { bottom: 20px; left: 20px; background: rgba(0, 255, 0, 0.4); border-color: #00ff00; }
        #info-btn { top: 120px; right: 20px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.2); border-color: #fff; }

        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,0,20,0.95); padding: 20px; border: 2px solid #00ffff; display: none; text-align: center; z-index: 100; border-radius: 15px; width: 80%; max-width: 320px; color: #fff; }
        .close-btn { margin-top: 15px; background: #333; color: #fff; border: 1px solid #fff; padding: 8px; border-radius: 5px; cursor: pointer; }
        button { background: #1a1a1a; color: #00ffff; border: 1px solid #00ffff; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div class="ui-top">
                <div>STAGE: <span id="stage-txt">1</span> | BOMB: <span id="bomb-txt-ui">3</span></div>
                <div>WEAPON: <span id="ammo-txt">Normal</span></div>
            </div>
            <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
        </div>
        
        <div id="pause-btn" class="mobile-btn" onclick="togglePause()">PAUSE</div>
        <div id="bomb-btn" class="mobile-btn" onclick="triggerMegaBomb()">BOMB</div>
        <div id="info-btn" class="mobile-btn" onclick="toggleInfo()">?</div>

        <div id="pause-menu" class="overlay">
            <h3>PAUSED</h3>
            <button onclick="togglePause()" style="width:100%">CONTINUE</button>
        </div>

        <div id="upgrade-menu" class="overlay">
            <h3>SELECT UPGRADE</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button onclick="applyUpgrade('MachineGun')">⚡ 머신건</button>
                <button onclick="applyUpgrade('Laser')">🔦 레이저</button>
                <button onclick="applyUpgrade('Homing')" style="grid-column: 1/-1;">🎯 유도 미사일</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GAME_W = 480, GAME_H = 800;
canvas.width = GAME_W; canvas.height = GAME_H;

// --- 오디오 시스템 (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol=0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// --- 게임 변수 ---
let stage = 1, kills = 0, bombInventory = 3, isPaused = false, gameOver = false, isShooting = false;
let weaponType = 'Normal', ammo = 0;
let player = { x: 225, y: 700, w: 34, h: 40, hp: 100, lastShot: 0, lastHoming: 0 };
let bullets = [], enemies = [], homingMissiles = [];
let stars = Array.from({length: 30}, () => ({x: Math.random()*GAME_W, y: Math.random()*GAME_H, s: Math.random()*2+1}));

// --- 키보드 제어 ---
window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'p') togglePause();
    if (key === 'z') triggerMegaBomb();
});

function togglePause() {
    if (gameOver) return;
    isPaused = !isPaused;
    document.getElementById('pause-menu').style.display = isPaused ? 'block' : 'none';
}

function triggerMegaBomb() {
    if (bombInventory > 0 && !gameOver && !isPaused) {
        bombInventory--; 
        enemies = [];
        playSound(100, 'square', 0.5, 0.2); // 폭탄 사운드
        document.getElementById('bomb-txt-ui').innerText = bombInventory;
    }
}

function applyUpgrade(type) { 
    weaponType = type; ammo = 100; isPaused = false; 
    document.getElementById('upgrade-menu').style.display = 'none'; 
    playSound(800, 'sine', 0.2);
}

function update() {
    if (isPaused || gameOver) return;

    // 발사 로직
    if (isShooting) {
        const now = Date.now();
        
        // 1. 기본/머신건/레이저 공격
        let shootDelay = (weaponType === 'MachineGun') ? 80 : 300;
        if (now - player.lastShot > shootDelay) {
            if (weaponType === 'Laser') {
                bullets.push({ x: player.x + 14, y: player.y, w: 6, h: 40, type: 'laser' });
                playSound(400, 'sawtooth', 0.1, 0.05);
            } else {
                bullets.push({ x: player.x + 14, y: player.y, w: 6, h: 18, type: 'normal' });
                playSound(600, 'sine', 0.05, 0.05);
            }
            player.lastShot = now;
            if (weaponType !== 'Normal' && weaponType !== 'Homing') ammo--;
        }

        // 2. 유도 미사일 공격 (기본 공격과 병행)
        if (weaponType === 'Homing' && now - player.lastHoming > 500) {
            homingMissiles.push({ x: player.x + 17, y: player.y, target: null });
            player.lastHoming = now;
            ammo--;
            playSound(300, 'triangle', 0.2);
        }

        if (ammo <= 0) weaponType = 'Normal';
    }

    // 적 생성
    if (Math.random() < 0.02 + (stage * 0.005)) {
        enemies.push({ x: 30 + Math.random() * (GAME_W-60), y: -50, r: 20, hp: 1 + Math.floor(stage/2), speedY: 2 });
    }

    // 적 이동 및 충돌
    enemies.forEach((e, ei) => {
        e.y += e.speedY;
        if (e.y > GAME_H) enemies.splice(ei, 1);
        if (Math.hypot(e.x - (player.x + 17), e.y - (player.y + 20)) < e.r + 15) {
            player.hp -= 10; enemies.splice(ei, 1);
            playSound(150, 'sine', 0.1);
        }
    });

    // 일반 총알/레이저 이동 및 충돌
    bullets.forEach((b, bi) => {
        b.y -= (b.type === 'laser' ? 25 : 15);
        if (b.y < -50) bullets.splice(bi, 1);
        enemies.forEach((e, ei) => {
            if (b.x < e.x + e.r && b.x + b.w > e.x - e.r && b.y < e.y + e.r && b.y + b.h > e.y - e.r) {
                e.hp--; if(b.type !== 'laser') bullets.splice(bi, 1);
                if (e.hp <= 0) { enemies.splice(ei, 1); kills++; playSound(200, 'square', 0.05); }
            }
        });
    });

    // 유도 미사일 로직
    homingMissiles.forEach((m, mi) => {
        if (enemies.length > 0) {
            let target = enemies[0];
            let dx = target.x - m.x, dy = target.y - m.y;
            let dist = Math.hypot(dx, dy);
            m.x += (dx / dist) * 7; m.y += (dy / dist) * 7;
        } else { m.y -= 7; }

        if (m.y < -20 || m.x < 0 || m.x > GAME_W) homingMissiles.splice(mi, 1);
        
        enemies.forEach((e, ei) => {
            if (Math.hypot(m.x - e.x, m.y - e.y) < e.r + 5) {
                e.hp = 0; enemies.splice(ei, 1); homingMissiles.splice(mi, 1);
                kills++; playSound(200, 'square', 0.05);
            }
        });
    });

    if (kills > 0 && kills % 25 === 0) { kills++; isPaused = true; document.getElementById('upgrade-menu').style.display = 'block'; }
    if (player.hp <= 0) { player.hp = 0; gameOver = true; }
    
    document.getElementById('hp-bar-fill').style.width = player.hp + "%";
    document.getElementById('ammo-txt').innerText = weaponType + (weaponType!=='Normal' ? ` (${ammo})` : "");
}

function draw() {
    ctx.clearRect(0, 0, GAME_W, GAME_H);
    
    // 배경 별
    ctx.fillStyle = '#fff';
    stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); s.y += 0.5; if(s.y > GAME_H) s.y = 0; });
    
    // 플레이어
    ctx.fillStyle = (weaponType === 'MachineGun') ? '#ff0' : (weaponType === 'Laser') ? '#f0f' : '#0ff';
    ctx.beginPath(); ctx.moveTo(player.x + 17, player.y); ctx.lineTo(player.x + 34, player.y + 40); ctx.lineTo(player.x, player.y + 40); ctx.fill();
    
    // 적
    enemies.forEach(e => { ctx.fillStyle = '#f33'; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill(); });
    
    // 총알 디자인 구분
    bullets.forEach(b => {
        if (b.type === 'laser') {
            ctx.fillStyle = '#f0f'; ctx.shadowBlur = 10; ctx.shadowColor = '#f0f';
            ctx.fillRect(b.x, b.y, b.w, b.h); ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = (weaponType === 'MachineGun') ? '#ff0' : '#fff';
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }
    });

    // 유도 미사일 디자인
    homingMissiles.forEach(m => {
        ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(m.x, m.y, 6, 0, Math.PI*2); ctx.fill();
    });

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,GAME_W, GAME_H);
        ctx.fillStyle = 'red'; ctx.font = 'bold 30px Arial'; ctx.textAlign='center';
        ctx.fillText('MISSION FAILED', GAME_W/2, GAME_H/2);
    }
}

// 입력 처리 (마우스/터치)
function handleInput(e) {
    if (gameOver || isPaused) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = GAME_W / rect.width, scaleY = GAME_H / rect.height;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    player.x = (clientX - rect.left) * scaleX - player.w / 2;
    player.y = (clientY - rect.top) * scaleY - player.h / 2;
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

canvas.addEventListener('mousedown', (e) => { if(gameOver) location.reload(); isShooting = true; handleInput(e); });
window.addEventListener('mousemove', (e) => { if(isShooting) handleInput(e); });
window.addEventListener('mouseup', () => isShooting = false);
canvas.addEventListener('touchstart', (e) => { if(gameOver) location.reload(); isShooting = true; handleInput(e); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener('touchend', () => isShooting = false);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
