<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Virus Shooter</title>
<style>
body { margin:0; background:#000; overflow:hidden; }
canvas { display:block; margin:auto; background:#050510; }
#ui { position:absolute; top:10px; left:10px; color:#fff; font-size:14px; }
.overlay {
 position:absolute; top:50%; left:50%;
 transform:translate(-50%,-50%);
 background:#111; padding:20px;
 border:2px solid #0ff; color:#fff;
 display:none;
}
button { margin:5px; padding:8px; }
</style>
</head>
<body>

<div id="ui">
HP: <span id="hp"></span> |
SCORE: <span id="score"></span> |
COIN: <span id="coin"></span> |
CRIT: <span id="crit"></span>
</div>

<div id="shop" class="overlay">
<h3>SHOP</h3>
<button onclick="buy('damage')">공격력 +1 (10코인)</button>
<button onclick="buy('crit')">크리티컬 +5% (15코인)</button>
<button onclick="closeShop()">닫기</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 480;
canvas.height = 800;

// ===== 플레이어 =====
let player = {
 x:240, y:700, hp:100,
 damage:1,
 crit:0.1
};

// ===== 상태 =====
let bullets=[], enemies=[], particles=[];
let score=0, coins=0;
let lastShot=0;

// ===== 파티클 =====
function spawnParticles(x,y,color,count=10){
 for(let i=0;i<count;i++){
  particles.push({
   x,y,
   vx:(Math.random()-0.5)*4,
   vy:(Math.random()-0.5)*4,
   life:30,
   color
  });
 }
}

// ===== 총알 =====
function shoot(){
 if(Date.now()-lastShot<200)return;
 bullets.push({x:player.x,y:player.y});
 lastShot=Date.now();
}

// ===== 적 생성 =====
function spawnEnemy(){
 enemies.push({
  x:Math.random()*440+20,
  y:-20,
  hp:3,
  type:'normal'
 });
}

// ===== 보스 =====
function spawnBoss(){
 enemies.push({
  x:240,y:100,
  hp:100,
  type:'boss',
  phase:1,
  t:0
 });
}

// ===== 충돌 =====
function hitEnemy(e, dmg){
 let isCrit = Math.random() < player.crit;
 let finalDmg = isCrit ? dmg*2 : dmg;

 e.hp -= finalDmg;

 if(isCrit){
  spawnParticles(e.x,e.y,'yellow',20);
 }

 if(e.hp<=0){
  score+=100;
  coins+=5;
  spawnParticles(e.x,e.y,'red',25);
  enemies.splice(enemies.indexOf(e),1);
 }
}

// ===== 상점 =====
function buy(type){
 if(type==='damage' && coins>=10){
  coins-=10;
  player.damage++;
 }
 if(type==='crit' && coins>=15){
  coins-=15;
  player.crit+=0.05;
 }
}

// ===== 보스 AI =====
function bossAI(b){
 b.t++;

 // 페이즈 변경
 if(b.hp<70) b.phase=2;
 if(b.hp<30) b.phase=3;

 if(b.phase===1){
  b.x += Math.sin(b.t/20)*2;
 }
 else if(b.phase===2){
  b.x += Math.sin(b.t/10)*4;
 }
 else if(b.phase===3){
  b.x += Math.sin(b.t/5)*6;
 }
}

// ===== 업데이트 =====
function update(){
 if(Math.random()<0.02) spawnEnemy();

 bullets.forEach((b,bi)=>{
  b.y-=10;

  enemies.forEach(e=>{
   if(Math.hypot(b.x-e.x,b.y-e.y)<20){
    hitEnemy(e, player.damage);
    bullets.splice(bi,1);
   }
  });
 });

 enemies.forEach(e=>{
  if(e.type==='boss') bossAI(e);
  else e.y+=2;
 });

 // 파티클
 particles.forEach((p,pi)=>{
  p.x+=p.vx;
  p.y+=p.vy;
  p.life--;
  if(p.life<=0) particles.splice(pi,1);
 });

 // UI
 document.getElementById('hp').innerText=player.hp;
 document.getElementById('score').innerText=score;
 document.getElementById('coin').innerText=coins;
 document.getElementById('crit').innerText=Math.floor(player.crit*100)+'%';
}

// ===== 그리기 =====
function draw(){
 ctx.clearRect(0,0,480,800);

 // 플레이어
 ctx.fillStyle='cyan';
 ctx.fillRect(player.x-10,player.y-10,20,20);

 // 총알
 ctx.fillStyle='yellow';
 bullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,4,10);
 });

 // 적
 enemies.forEach(e=>{
  ctx.fillStyle=e.type==='boss'?'red':'green';
  ctx.beginPath();
  ctx.arc(e.x,e.y,15,0,Math.PI*2);
  ctx.fill();
 });

 // 파티클
 particles.forEach(p=>{
  ctx.fillStyle=p.color;
  ctx.fillRect(p.x,p.y,3,3);
 });
}

// ===== 입력 =====
canvas.addEventListener('mousemove',e=>{
 player.x = e.offsetX;
 player.y = e.offsetY;
 shoot();
});

canvas.addEventListener('click',()=>{
 document.getElementById('shop').style.display='block';
});

function closeShop(){
 document.getElementById('shop').style.display='none';
}

// ===== 루프 =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

// ===== 보스 등장 =====
setTimeout(spawnBoss,10000);

</script>
</body>
</html>
