<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virus Shooter Ultimate FIX</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto;background:#050510;}
#ui{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 color:#fff;font-size:12px;
 background:rgba(0,0,0,0.7);
 padding:8px;border-radius:10px;
}
.overlay{
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:#111;padding:20px;
 color:#fff;border:2px solid #0ff;
 display:none;
}
button{margin:5px;padding:10px;}
</style>
</head>
<body>

<div id="ui">
STAGE <span id="stage">1</span> |
SCORE <span id="score">0</span> |
COMBO <span id="combo">0</span>
</div>

<div id="upgrade" class="overlay">
<h3>무기 선택</h3>
<button onclick="upgrade('machine')">⚡ 머신건</button>
<button onclick="upgrade('laser')">🔦 레이저</button>
<button onclick="upgrade('homing')">🎯 유도탄</button>
<button onclick="upgrade('all')">🔥 종합</button>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
c.width=480; c.height=800;

// ===== AUDIO =====
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const bgMusic=new Audio('music.mp3');
bgMusic.loop=true;
let started=false;

function startAudio(){
 if(!started){
  if(audioCtx.state==='suspended') audioCtx.resume();
  bgMusic.play().catch(()=>{});
  started=true;
 }
}

function playSound(f){
 if(audioCtx.state==='suspended') audioCtx.resume();
 const o=audioCtx.createOscillator();
 const g=audioCtx.createGain();
 o.frequency.value=f;
 g.gain.value=0.05;
 o.connect(g); g.connect(audioCtx.destination);
 o.start(); o.stop(audioCtx.currentTime+0.1);
}

// ===== PLAYER =====
let player={x:240,y:700,hp:100,shield:0};

// ===== STATE =====
let bullets=[],enemies=[],eBullets=[],items=[];
let kills=0,score=0,combo=0,lastKill=0;

// ===== WEAPON =====
let weapon={
 machine:0,
 laser:0,
 homing:0
};

// ===== INPUT =====
let shooting=false;
c.addEventListener('mousedown',e=>{
 startAudio();
 shooting=true;
 move(e);
});
window.addEventListener('mousemove',e=>shooting&&move(e));
window.addEventListener('mouseup',()=>shooting=false);

function move(e){
 const r=c.getBoundingClientRect();
 player.x=e.clientX-r.left;
 player.y=e.clientY-r.top;
}

// ===== SHOOT =====
let lastShot=0;
function shoot(){
 let now=Date.now();

 let delay=300/(weapon.machine+1);

 if(now-lastShot<delay) return;

 // 기본탄
 bullets.push({x:player.x,y:player.y,vx:0,type:'normal'});

 // 머신건 강화 → 퍼짐
 for(let i=0;i<weapon.machine;i++){
  bullets.push({x:player.x,y:player.y,vx:(Math.random()-0.5)*4,type:'normal'});
 }

 // 레이저
 if(weapon.laser>0){
  bullets.push({x:player.x,y:player.y,vx:0,type:'laser',power:weapon.laser});
 }

 // 유도탄
 for(let i=0;i<weapon.homing;i++){
  bullets.push({x:player.x,y:player.y,type:'homing'});
 }

 playSound(400);
 lastShot=now;
}

// ===== ENEMY =====
function spawnEnemy(){
 enemies.push({
  x:Math.random()*440+20,
  y:-20,
  r:20,
  hp:2,
  lastShoot:0
 });
}

// ===== BOSS =====
function spawnBoss(){
 enemies.push({
  x:240,y:100,r:50,
  hp:100,isBoss:true,
  phase:1,lastShoot:0
 });
}

// ===== ITEM =====
function spawnItem(x,y){
 items.push({x,y});
}

// ===== UPGRADE =====
function upgrade(t){
 if(t==='all'){
  weapon.machine++;
  weapon.laser++;
  weapon.homing++;
 }else{
  weapon[t]++;
 }
 document.getElementById('upgrade').style.display='none';
}

// ===== UPDATE =====
function update(){
 if(shooting) shoot();

 if(Math.random()<0.02) spawnEnemy();

 // 보스
 if(kills>0 && kills%50===0){
  spawnBoss();
  kills++;
 }

 // 아이템
 if(kills>0 && kills%20===0){
  spawnItem(player.x,0);
  kills++;
 }

 bullets.forEach((b,bi)=>{

  // 이동
  if(b.type==='homing'){
   let t=enemies[0];
   if(t){
    let dx=t.x-b.x, dy=t.y-b.y;
    let d=Math.hypot(dx,dy);
    b.x+=dx/d*6;
    b.y+=dy/d*6;
   }else b.y-=6;
  }else{
   b.y-=10;
   b.x+=b.vx||0;
  }

  enemies.forEach((e,ei)=>{
   if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){

    let dmg=1;

    if(b.type==='laser') dmg=2*b.power;

    e.hp-=dmg;

    if(e.hp<=0){
     let now=Date.now();
     combo=(now-lastKill<1500)?combo+1:1;
     lastKill=now;

     score+=100+combo*10;
     kills++;

     enemies.splice(ei,1);
    }

    if(b.type!=='laser') bullets.splice(bi,1);
   }
  });
 });

 enemies.forEach(e=>{
  if(e.isBoss){
   if(e.hp<50) e.phase=2;

   if(e.phase===1){
    e.x+=Math.sin(Date.now()/200)*3;
   }else{
    if(Date.now()-e.lastShoot>500){
     for(let i=-2;i<=2;i++){
      eBullets.push({x:e.x,y:e.y,vx:i*2,vy:5});
     }
     e.lastShoot=Date.now();
    }
   }
  }else{
   e.y+=2;
  }

  if(Date.now()-e.lastShoot>1200){
   eBullets.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*2,vy:4});
   e.lastShoot=Date.now();
  }
 });

 eBullets.forEach((b,bi)=>{
  b.x+=b.vx; b.y+=b.vy;

  if(Math.hypot(b.x-player.x,b.y-player.y)<15){
   if(player.shield>0) player.shield--;
   else player.hp-=5;
   eBullets.splice(bi,1);
  }
 });

 items.forEach((it,i)=>{
  it.y+=2;
  if(Math.hypot(it.x-player.x,it.y-player.y)<20){
   player.shield=5;
   items.splice(i,1);
  }
 });

 document.getElementById('score').innerText=score;
 document.getElementById('combo').innerText=combo;
}

// ===== DRAW =====
function draw(){
 ctx.clearRect(0,0,480,800);

 ctx.fillStyle='cyan';
 ctx.beginPath();
 ctx.moveTo(player.x,player.y-10);
 ctx.lineTo(player.x+10,player.y+10);
 ctx.lineTo(player.x-10,player.y+10);
 ctx.fill();

 if(player.shield>0){
  ctx.strokeStyle='#0ff';
  ctx.beginPath();
  ctx.arc(player.x,player.y,25,0,Math.PI*2);
  ctx.stroke();
 }

 bullets.forEach(b=>{
  ctx.fillStyle=b.type==='laser'?'#f0f':'#ff0';
  ctx.fillRect(b.x,b.y,4,10);
 });

 enemies.forEach(e=>{
  ctx.fillStyle=e.isBoss?'red':'green';
  ctx.beginPath();
  ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
  ctx.fill();
 });

 eBullets.forEach(b=>{
  ctx.fillStyle='orange';
  ctx.beginPath();
  ctx.arc(b.x,b.y,4,0,Math.PI*2);
  ctx.fill();
 });

 if(player.hp<=0){
  ctx.fillStyle='white';
  ctx.fillText("GAME OVER",200,400);
 }
}

// ===== LOOP =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
