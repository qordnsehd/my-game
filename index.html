<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corona Buster Ultimate</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; max-width: 100%; max-height: 100%; background: radial-gradient(circle, #0a1020, #000); border: 1px solid #444; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 90%; max-width: 440px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; z-index: 10; border: 1px solid #0ff; color: #fff; }
        .ui-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        #hp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #0f0); transition: width 0.2s; }
        #mobile-controls { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 25px; border: 1px solid rgba(0, 255, 255, 0.5); background: rgba(0, 0, 0, 0.4); color: #0ff; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,10,30,0.95); padding: 25px; border: 2px solid #0ff; text-align: center; z-index: 100; border-radius: 15px; color: #fff; width: 280px; }
        button { background: #1a1a1a; color: #0ff; border: 1px solid #0ff; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 8px 0; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay" class="overlay">
            <h1 style="color:#0ff; margin:0 0 10px 0;">CORONA BUSTER</h1>
            <button onclick="startGame()">백신 투입 (START)</button>
        </div>

        <div id="mobile-controls">
            <div class="ctrl-btn" onclick="togglePause()">P</div>
            <div class="ctrl-btn" onclick="useBomb()">Z</div>
        </div>

        <div id="ui">
            <div class="ui-row">
                <div>STAGE: <span id="stage-txt">1</span> | SCORE: <span id="score-txt">0</span></div>
                <div>BOMB: <span id="bomb-txt">3</span></div>
            </div>
            <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
        </div>

        <div id="upgrade-menu" class="overlay" style="display:none;">
            <h3 id="upgrade-title">STAGE CLEAR!</h3>
            <p>무기를 강화하세요</p>
            <button onclick="applyUpgrade('machine')">⚡ 고속 분사기</button>
            <button onclick="applyUpgrade('laser')">🔦 살균 광선</button>
            <button onclick="applyUpgrade('homing')">🎯 추적 항체</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GAME_W = 480, GAME_H = 800;
canvas.width = GAME_W; canvas.height = GAME_H;

// ===== 오디오 엔진 (도트 음악 생성기) =====
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let bgmInterval;

function initAudio() { 
    if (!audioCtx) audioCtx = new AudioContext(); 
    if (audioCtx.state === 'suspended') audioCtx.resume(); 
}

function playBGM() {
    let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (isPaused || gameOver) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
        g.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
        step++;
    }, 250);
}

function playWeaponSound(type) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'machine') { o.type = 'square'; o.frequency.setValueAtTime(800, now); g.gain.setValueAtTime(0.03, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.05); o.start(); o.stop(now + 0.05); }
    else if (type === 'laser') { o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now); g.gain.setValueAtTime(0.04, now); g.gain.linearRampToValueAtTime(0, now + 0.1); o.start(); o.stop(now + 0.1); }
    else if (type === 'homing') { o.type = 'sine'; o.frequency.setValueAtTime(400, now); o.frequency.exponentialRampToValueAtTime(800, now + 0.1); g.gain.setValueAtTime(0.03, now); o.start(); o.stop(now + 0.1); }
    else if (type === 'bomb') { o.type = 'sawtooth'; o.frequency.setValueAtTime(100, now); o.frequency.exponentialRampToValueAtTime(10, now + 0.8); g.gain.setValueAtTime(0.2, now); o.start(); o.stop(now + 0.8); }
}

// ===== 게임 변수 =====
let stage = 1, score = 0, kills = 0;
let isPaused = true, gameOver = false, shooting = false, gameStarted = false;
let bombCount = 3, flashEffect = 0;
let weapon = { machine: 0, laser: 0, homing: 0 };
let player = { x: 240, y: 700, hp: 100, lastShot: 0 };
let bullets = [], enemies = [], eBullets = [], items = [];

function startGame() { 
    initAudio(); 
    document.getElementById('start-overlay').style.display = 'none'; 
    isPaused = false; gameStarted = true; 
    playBGM();
}

function togglePause() { if(!gameStarted || gameOver) return; isPaused = !isPaused; }

function useBomb() { 
    if (bombCount > 0 && !isPaused && !gameOver) { 
        bombCount--; 
        playWeaponSound('bomb');
        flashEffect = 15; 
        enemies.forEach(e => { if (e.isBoss) e.hp -= 100; else { score += 100; } });
        enemies = enemies.filter(e => e.isBoss && e.hp > 0);
        eBullets = [];
        document.getElementById('bomb-txt').innerText = bombCount;
    } 
}

function handleInput(e) {
    if (!gameStarted || gameOver || isPaused) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    player.x = (clientX - rect.left) * (GAME_W / rect.width);
    player.y = (clientY - rect.top) * (GAME_H / rect.height);
}
canvas.addEventListener('mousedown', (e) => { shooting = true; handleInput(e); });
window.addEventListener('mousemove', (e) => { if(shooting) handleInput(e); });
window.addEventListener('mouseup', () => shooting = false);
canvas.addEventListener('touchstart', (e) => { shooting = true; handleInput(e); e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchend', () => shooting = false);

function applyUpgrade(t) { 
    weapon[t]++; 
    isPaused = false; 
    document.getElementById('upgrade-menu').style.display = 'none'; 
}

function shoot() {
    const now = Date.now();
    if (now - player.lastShot < 300 / (weapon.machine + 1)) return;
    bullets.push({x: player.x, y: player.y - 30, vx: 0, type: 'normal'});
    for(let i=0; i<weapon.machine; i++) bullets.push({x: player.x, y: player.y - 30, vx: (Math.random()-0.5)*6, type: 'normal'});
    if(weapon.laser > 0) bullets.push({x: player.x, y: player.y - 30, vx: 0, type: 'laser', pwr: weapon.laser});
    if(weapon.homing > 0) for(let i=0; i<weapon.homing; i++) bullets.push({x: player.x, y: player.y - 30, type: 'homing'});
    playWeaponSound(weapon.laser > 0 ? 'laser' : weapon.homing > 0 ? 'homing' : 'machine');
    player.lastShot = now;
}

function update() {
    if (isPaused || gameOver) return;
    if (shooting) shoot();

    // 적(바이러스) 생성
    if (Math.random() < 0.02 + (stage * 0.005)) {
        enemies.push({ x: Math.random()*(GAME_W-40)+20, y: -40, r: 18, hp: 2 + stage, isBoss: false, rot: Math.random()*Math.PI*2 });
    }

    enemies.forEach((e, ei) => {
        if (e.isBoss) {
            e.x += (e.vx || 2); if(e.x < 60 || e.x > GAME_W-60) e.vx = -(e.vx || 2);
            if (Math.random() < 0.05) eBullets.push({x: e.x, y: e.y+e.r, vx: (Math.random()-0.5)*4, vy: 4});
        } else {
            e.y += 2.5 + (stage * 0.1);
            e.rot += 0.05;
            if (Math.random() < 0.005) eBullets.push({x: e.x, y: e.y+e.r, vx: 0, vy: 5});
        }
        if (Math.hypot(e.x - player.x, e.y - player.y) < e.r + 20) player.hp -= 0.5;
    });

    bullets.forEach((b, bi) => {
        if (b.type === 'homing' && enemies.length > 0) {
            let target = enemies[0];
            let dx = target.x - b.x, dy = target.y - b.y, d = Math.hypot(dx, dy);
            b.x += dx/d*9; b.y += dy/d*9;
        } else { b.y -= 13; b.x += b.vx || 0; }
        
        enemies.forEach((e, ei) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.r + 15) {
                e.hp -= (b.type === 'laser' ? 0.5 : 1);
                if (b.type !== 'laser') bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    score += 100; kills++;
                    // 랜덤 아이템 드랍 (10% 확률)
                    if(Math.random() < 0.1) items.push({x: e.x, y: e.y, type: Math.random() > 0.5 ? 'bomb' : 'hp'});
                    if (e.isBoss) { 
                        stage++; 
                        isPaused = true; 
                        document.getElementById('upgrade-menu').style.display = 'block'; 
                        document.getElementById('stage-txt').innerText = stage;
                    }
                    enemies.splice(ei, 1);
                }
            }
        });
    });

    eBullets.forEach((eb, ebi) => {
        eb.x += eb.vx; eb.y += eb.vy;
        if (Math.hypot(eb.x - player.x, eb.y - player.y) < 20) { player.hp -= 10; eBullets.splice(ebi, 1); }
    });

    items.forEach((it, iti) => {
        it.y += 2;
        if (Math.hypot(it.x - player.x, it.y - player.y) < 30) {
            if (it.type === 'bomb') { bombCount++; document.getElementById('bomb-txt').innerText = bombCount; } 
            else player.hp = Math.min(100, player.hp + 30);
            items.splice(iti, 1);
        }
    });

    // 보스 출현 조건
    if (kills >= 30) { 
        enemies.push({ x: GAME_W/2, y: 100, r: 50, hp: 50 + stage*30, isBoss: true, vx: 2, rot: 0 }); 
        kills = 0; 
    }
    if (player.hp <= 0) gameOver = true;

    document.getElementById('hp-bar-fill').style.width = player.hp + "%";
    document.getElementById('score-txt').innerText = score;
}

function drawVirus(x, y, r, color, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.fillStyle = color;
    // 몸체
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    // 돌기
    for(let i=0; i<8; i++) {
        ctx.rotate(Math.PI/4);
        ctx.fillRect(r - 2, -3, 8, 6);
        ctx.beginPath(); ctx.arc(r + 6, 0, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, GAME_W, GAME_H);
    if (flashEffect > 0) { ctx.fillStyle = `rgba(255,255,255,${flashEffect/15})`; ctx.fillRect(0,0,GAME_W,GAME_H); flashEffect--; }

    // 플레이어
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = '#eee'; ctx.fillRect(-7, -20, 14, 40);
    ctx.fillStyle = '#0cf'; ctx.fillRect(-5, 0, 10, 18);
    ctx.fillStyle = '#999'; ctx.fillRect(-1, -32, 2, 12);
    ctx.restore();

    // 적 바이러스 디자인 적용
    enemies.forEach(e => {
        drawVirus(e.x, e.y, e.r, e.isBoss ? '#f36' : '#5f5', e.rot);
    });

    bullets.forEach(b => { 
        ctx.fillStyle = b.type === 'laser' ? '#f0f' : b.type === 'homing' ? '#0f0' : '#0ff'; 
        ctx.fillRect(b.x-2, b.y-10, 4, 20); 
    });
    eBullets.forEach(eb => { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
    
    // 아이템 디자인
    items.forEach(it => { 
        ctx.fillStyle = it.type === 'hp' ? '#f06' : '#ff0'; 
        ctx.font = "bold 16px Arial"; ctx.textAlign="center";
        ctx.fillText(it.type === 'hp' ? "H" : "B", it.x, it.y);
    });

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,GAME_W,GAME_H);
        ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font = '30px Arial';
        ctx.fillText("방역 실패!", GAME_W/2, GAME_H/2);
        ctx.font = '20px Arial'; ctx.fillText("클릭하여 재도전", GAME_W/2, GAME_H/2 + 50);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
canvas.addEventListener('click', () => { if(gameOver) location.reload(); });
loop();
</script>
</body>
</html>
