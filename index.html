<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corona Buster: Final Evolution (Keyboard Ready)</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; max-width: 100%; max-height: 100%; background: radial-gradient(circle, #0a1020, #000); border: 1px solid #444; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 90%; max-width: 440px; pointer-events: none; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; z-index: 10; border: 1px solid #0ff; color: #fff; }
        .ui-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        #hp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #0f0); transition: width 0.2s; }
        #mobile-controls { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 25px; border: 1px solid rgba(0, 255, 255, 0.5); background: rgba(0, 0, 0, 0.4); color: #0ff; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,10,30,0.95); padding: 25px; border: 2px solid #0ff; text-align: center; z-index: 100; border-radius: 15px; color: #fff; width: 280px; }
        button { background: #1a1a1a; color: #0ff; border: 1px solid #0ff; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 8px 0; width: 100%; transition: 0.3s; }
        button:disabled { color: #555; border-color: #555; cursor: default; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay" class="overlay">
            <h1 style="color:#0ff; margin:0 0 10px 0;">CORONA BUSTER</h1>
            <p style="font-size: 12px; color: #aaa;">이동: 방향키 | 폭탄: Z | 일시정지: P</p>
            <button onclick="startGame()">백신 투입 (START)</button>
        </div>

        <div id="mobile-controls">
            <div class="ctrl-btn" onclick="togglePause()">P</div>
            <div class="ctrl-btn" onclick="useBomb()">Z</div>
        </div>

        <div id="ui">
            <div class="ui-row">
                <div>STAGE: <span id="stage-txt">1</span> | SCORE: <span id="score-txt">0</span></div>
                <div>BOMB: <span id="bomb-txt">3</span> | SHIELD: <span id="shield-txt">0</span></div>
            </div>
            <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
        </div>

        <div id="upgrade-menu" class="overlay" style="display:none;">
            <h3 id="upgrade-title" style="color:#0ff;">EVOLUTION!</h3>
            <p id="upgrade-desc">무기를 선택하세요 (최대 Lv.3)</p>
            <button id="btn-machine" onclick="applyUpgrade('machine')">⚡ 머신건</button>
            <button id="btn-laser" onclick="applyUpgrade('laser')">🔦 레이저</button>
            <button id="btn-homing" onclick="applyUpgrade('homing')">🎯 유도탄</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GAME_W = 480, GAME_H = 800;
canvas.width = GAME_W; canvas.height = GAME_H;

const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx, bgmInterval;

function initAudio() { 
    if (!audioCtx) audioCtx = new AudioContext(); 
    if (audioCtx.state === 'suspended') audioCtx.resume(); 
}

function playBGM() {
    let notes = [261.63, 329.63, 392.00, 523.25];
    let step = 0;
    if(bgmInterval) clearInterval(bgmInterval);
    bgmInterval = setInterval(() => {
        if (isPaused || gameOver) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
        g.gain.setValueAtTime(0.015, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
        step++;
    }, 200);
}

function playWeaponSound(type) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'machine') { o.type = 'square'; o.frequency.setValueAtTime(800, now); g.gain.setValueAtTime(0.02, now); o.start(); o.stop(now + 0.05); }
    else if (type === 'laser') { o.type = 'sawtooth'; o.frequency.setValueAtTime(150, now); g.gain.setValueAtTime(0.03, now); o.start(); o.stop(now + 0.1); }
    else if (type === 'bomb') { o.type = 'sawtooth'; o.frequency.setValueAtTime(60, now); g.gain.setValueAtTime(0.3, now); o.start(); o.stop(now + 0.8); }
}

let stage = 1, score = 0, kills = 0;
let isPaused = true, gameOver = false, shooting = false, gameStarted = false;
let bombCount = 3, flashEffect = 0;
let weapon = { machine: 0, laser: 0, homing: 0 };
let player = { x: 240, y: 700, hp: 100, shield: 0, lastShot: 0 };
let bullets = [], enemies = [], eBullets = [], items = [];

// 키보드 상태 관리
const keys = {};

function startGame() { 
    initAudio(); 
    document.getElementById('start-overlay').style.display = 'none'; 
    isPaused = false; gameStarted = true; 
    playBGM();
}

function togglePause() { if(!gameStarted || gameOver) return; isPaused = !isPaused; }

function useBomb() { 
    if (bombCount > 0 && !isPaused && !gameOver) { 
        bombCount--; 
        playWeaponSound('bomb');
        flashEffect = 20; 
        enemies.forEach(e => {
            if (e.isBoss) e.hp -= 305; 
            else e.hp = 0;
        });
        enemies = enemies.filter(e => e.hp > 0);
        eBullets = [];
        document.getElementById('bomb-txt').innerText = bombCount;
    } 
}

// 키보드 이벤트 리스너
window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key.toLowerCase() === 'z') useBomb();
    if (e.key.toLowerCase() === 'p') togglePause();
    if (e.key.toLowerCase() === 'h') player.hp = 100; // H키 체력 회복 추가
    if (e.code === 'Space') shooting = true;
});
window.addEventListener('keyup', (e) => {
    keys[e.key] = false;
    if (e.code === 'Space') shooting = false;
});

function handleInput(e) {
    if (!gameStarted || gameOver || isPaused) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    player.x = (clientX - rect.left) * (GAME_W / rect.width);
    player.y = (clientY - rect.top) * (GAME_H / rect.height);
}

// 마우스/터치 리스너
canvas.addEventListener('mousedown', (e) => { shooting = true; handleInput(e); });
window.addEventListener('mousemove', (e) => { if(shooting) handleInput(e); });
window.addEventListener('mouseup', () => shooting = false);
canvas.addEventListener('touchstart', (e) => { shooting = true; handleInput(e); e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
canvas.addEventListener('touchend', () => shooting = false);

function openUpgradeMenu() {
    if (weapon.machine >= 3 && weapon.laser >= 3 && weapon.homing >= 3) {
        score += 5000; 
        return;
    }
    isPaused = true;
    document.getElementById('upgrade-menu').style.display = 'block';
    ['machine', 'laser', 'homing'].forEach(type => {
        const btn = document.getElementById(`btn-${type}`);
        const names = {machine: '머신건', laser: '레이저', homing: '유도탄'};
        btn.innerText = `${names[type]} (Lv.${weapon[type]})`;
        btn.disabled = weapon[type] >= 3;
        if(weapon[type] >= 3) btn.innerText += " - MAX";
    });
}

function applyUpgrade(t) { 
    if(weapon[t] < 3) weapon[t]++; 
    isPaused = false; 
    document.getElementById('upgrade-menu').style.display = 'none'; 
}

function shoot() {
    const now = Date.now();
    if (now - player.lastShot < 300 / (weapon.machine + 1.2)) return;
    bullets.push({x: player.x, y: player.y - 30, vx: 0, type: 'normal'});
    for(let i=0; i<weapon.machine; i++) {
        bullets.push({x: player.x, y: player.y - 30, vx: (i+1)*2.5, type: 'normal'});
        bullets.push({x: player.x, y: player.y - 30, vx: -(i+1)*2.5, type: 'normal'});
    }
    if(weapon.laser > 0) bullets.push({x: player.x, y: player.y - 30, vx: 0, type: 'laser', pwr: weapon.laser});
    if(weapon.homing > 0) {
        for(let i=0; i<weapon.homing; i++) bullets.push({x: player.x, y: player.y - 30, type: 'homing'});
    }
    playWeaponSound(weapon.laser > 0 ? 'laser' : 'machine');
    player.lastShot = now;
}

function update() {
    if (isPaused || gameOver) return;

    // 키보드 이동 로직 추가
    const pSpeed = 6;
    if (keys['ArrowLeft']) player.x = Math.max(20, player.x - pSpeed);
    if (keys['ArrowRight']) player.x = Math.min(GAME_W - 20, player.x + pSpeed);
    if (keys['ArrowUp']) player.y = Math.max(20, player.y - pSpeed);
    if (keys['ArrowDown']) player.y = Math.min(GAME_H - 20, player.y + pSpeed);
    if (keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown']) shooting = true;

    if (shooting) shoot();
    
    const totalWpnLv = weapon.machine + weapon.laser + weapon.homing;
    const enemySpeed = 2.5 + (stage * 0.4) + (totalWpnLv * 0.3);
    const spawnRate = 0.02 + (stage * 0.006) + (totalWpnLv * 0.004);
    
    if (Math.random() < spawnRate) {
        enemies.push({ x: Math.random()*(GAME_W-40)+20, y: -40, r: 18, hp: 2 + stage + totalWpnLv, isBoss: false, rot: Math.random()*Math.PI*2 });
    }
    enemies.forEach((e, ei) => {
        if (e.isBoss) {
            e.x += (e.vx || 2); if(e.x < 60 || e.x > GAME_W-60) e.vx = -(e.vx || 2);
            if (Math.random() < 0.06 + (totalWpnLv * 0.01)) {
                eBullets.push({x: e.x, y: e.y+e.r, vx: (Math.random()-0.5)*12, vy: 5 + stage + totalWpnLv});
            }
        } else {
            e.y += enemySpeed; e.rot += 0.05;
            if (Math.random() < 0.012) eBullets.push({x: e.x, y: e.y+e.r, vx: 0, vy: 5.5 + totalWpnLv});
        }
        if (Math.hypot(e.x - player.x, e.y - player.y) < e.r + 20) {
            if(player.shield > 0) player.shield -= 0.1; else player.hp -= 1.0;
        }
    });
    bullets.forEach((b, bi) => {
        if (b.type === 'homing' && enemies.length > 0) {
            let target = enemies[0];
            let dx = target.x - b.x, dy = target.y - b.y, d = Math.hypot(dx, dy);
            b.x += (dx/d)*12; b.y += (dy/d)*12;
        } else { b.y -= 16; b.x += b.vx || 0; }
        enemies.forEach((e, ei) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.r + 18) {
                e.hp -= (b.type === 'laser' ? (0.6 * b.pwr) : 1);
                if (b.type !== 'laser') bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    score += 100; kills++;
                    const rand = Math.random();
                    if(rand < 0.2) {
                        let itType = 'hp';
                        if(rand < 0.05) itType = 'power';
                        else if(rand < 0.10) itType = 'shield';
                        else if(rand < 0.15) itType = 'bomb';
                        items.push({x: e.x, y: e.y, type: itType});
                    }
                    if (e.isBoss) { stage++; openUpgradeMenu(); document.getElementById('stage-txt').innerText = stage; }
                    enemies.splice(ei, 1);
                }
            }
        });
    });
    eBullets.forEach((eb, ebi) => {
        eb.x += eb.vx; eb.y += eb.vy;
        if (Math.hypot(eb.x - player.x, eb.y - player.y) < 22) {
            if(player.shield > 0) player.shield--; else player.hp -= 15;
            eBullets.splice(ebi, 1);
        }
    });
    items.forEach((it, iti) => {
        it.y += 4;
        if (Math.hypot(it.x - player.x, it.y - player.y) < 35) {
            if (it.type === 'bomb') bombCount++;
            else if (it.type === 'hp') player.hp = Math.min(100, player.hp + 30);
            else if (it.type === 'shield') player.shield += 5;
            else if (it.type === 'power') openUpgradeMenu();
            items.splice(iti, 1);
        }
    });
    if (kills >= 30) { 
        enemies.push({ x: GAME_W/2, y: 100, r: 70, hp: 900 + (stage * 100), isBoss: true, vx: 2.5 + (totalWpnLv * 0.6), rot: 0 }); 
        kills = 0; 
    }
    if (player.hp <= 0) gameOver = true;
    document.getElementById('hp-bar-fill').style.width = player.hp + "%";
    document.getElementById('score-txt').innerText = score;
    document.getElementById('bomb-txt').innerText = bombCount;
    document.getElementById('shield-txt').innerText = Math.floor(player.shield);
}

function drawVirus(x, y, r, color, rot) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(rot); ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    for(let i=0; i<12; i++) {
        ctx.rotate(Math.PI*2/12); ctx.fillRect(r - 2, -4, 14, 8);
        ctx.beginPath(); ctx.arc(r + 12, 0, 7, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, GAME_W, GAME_H);
    if (flashEffect > 0) { ctx.fillStyle = `rgba(255,255,255,${flashEffect/20})`; ctx.fillRect(0,0,GAME_W,GAME_H); flashEffect--; }
    ctx.save(); ctx.translate(player.x, player.y);
    if(stage > 1) {
        ctx.fillStyle = '#666'; ctx.beginPath(); ctx.moveTo(-10, 5); ctx.lineTo(-45, 25); ctx.lineTo(-10, 30); ctx.fill();
        ctx.beginPath(); ctx.moveTo(10, 5); ctx.lineTo(45, 25); ctx.lineTo(10, 30); ctx.fill();
    }
    if(stage > 3) {
        ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(-55, 15); ctx.lineTo(-10, 20); ctx.fill();
        ctx.beginPath(); ctx.moveTo(10, -5); ctx.lineTo(55, 15); ctx.lineTo(10, 20); ctx.fill();
    }
    ctx.fillStyle = '#eee'; ctx.fillRect(-8, -22, 16, 44);
    ctx.fillStyle = '#0cf'; ctx.fillRect(-6, 0, 12, 20);
    ctx.fillStyle = '#fff'; ctx.fillRect(-1, -35, 2, 15);
    if(player.shield > 0) {
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3; ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
    enemies.forEach(e => drawVirus(e.x, e.y, e.r, e.isBoss ? '#f36' : '#5f5', e.rot));
    bullets.forEach(b => { ctx.fillStyle = b.type === 'laser' ? '#f0f' : b.type === 'homing' ? '#0f0' : '#0ff'; ctx.fillRect(b.x-2, b.y-12, 4, 24); });
    eBullets.forEach(eb => { ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill(); });
    items.forEach(it => { 
        ctx.fillStyle = '#fff'; ctx.font = "bold 20px Arial"; ctx.textAlign="center";
        let label = "H";
        if(it.type === 'bomb') { label = "B"; ctx.fillStyle = "#fb0"; }
        else if(it.type === 'shield') { label = "S"; ctx.fillStyle = "#0ff"; }
        else if(it.type === 'power') { label = "P"; ctx.fillStyle = "#f0f"; }
        ctx.fillText(label, it.x, it.y);
    });
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,GAME_W,GAME_H);
        ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font = '30px Arial';
        ctx.fillText("방역 완료!", GAME_W/2, GAME_H/2 - 30);
        ctx.font = '20px Arial'; ctx.fillText(`SCORE: ${score}`, GAME_W/2, GAME_H/2 + 20);
        ctx.fillText("클릭하여 재시작", GAME_W/2, GAME_H/2 + 70);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
canvas.addEventListener('click', () => { if(gameOver) location.reload(); });
loop();
</script>
</body>
</html>
