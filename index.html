<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virus Shooter Ultimate</title>
<style>
html,body{margin:0;padding:0;background:#000;overflow:hidden;}
canvas{display:block;margin:auto;background:linear-gradient(#050505,#110022);}
#ui{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 color:#fff;font-size:12px;
 background:rgba(0,0,0,0.7);
 padding:8px;border-radius:10px;
}
</style>
</head>
<body>

<div id="ui">
STAGE: <span id="stage-txt">1</span> |
SCORE: <span id="score-txt">0</span> |
COMBO: <span id="combo-txt">0</span>
<br>
HP: <span id="hp-txt">100</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 480;
canvas.height = 800;

// ===== 음악 (버그 수정 완료) =====
const bgMusic = new Audio('music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.3;
let musicStarted = false;

function startMusic(){
 if(!musicStarted){
  bgMusic.play().catch(()=>{});
  musicStarted = true;
 }
}

// ===== 사운드 =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function playSound(f,t,d,v=0.05){
 try{
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=t;
  o.frequency.value=f;
  g.gain.value=v;
  g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+d);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+d);
 }catch(e){}
}

// ===== 상태 =====
let player={x:240,y:700,hp:100};
let bullets=[], enemies=[], eBullets=[];
let stage=1, kills=0;
let score=0, combo=0, lastKillTime=0;
let critChance=0.15;
let isShooting=false, gameOver=false;

// ===== 입력 =====
canvas.addEventListener('mousedown',e=>{
 startMusic();
 if(gameOver) location.reload();
 isShooting=true;
 movePlayer(e);
});
window.addEventListener('mousemove',e=>{
 if(isShooting) movePlayer(e);
});
window.addEventListener('mouseup',()=>isShooting=false);

function movePlayer(e){
 const rect=canvas.getBoundingClientRect();
 player.x=(e.clientX-rect.left);
 player.y=(e.clientY-rect.top);
}

// ===== 총 =====
let lastShot=0;
function shoot(){
 if(Date.now()-lastShot<200) return;
 bullets.push({x:player.x,y:player.y});
 playSound(400,'square',0.05);
 lastShot=Date.now();
}

// ===== 적 생성 =====
function spawnEnemy(){
 enemies.push({
  x:Math.random()*440+20,
  y:-20,
  r:20,
  hp:2+stage*0.2,
  lastShoot:0
 });
}

// ===== 보스 =====
function spawnBoss(){
 enemies.push({
  x:240,y:100,
  r:50,
  hp:80+stage*20,
  isBoss:true,
  phase:1,
  lastShoot:0
 });
}

// ===== 업데이트 =====
function update(){
 if(gameOver) return;

 if(isShooting) shoot();

 // 적 생성
 if(Math.random()<0.02) spawnEnemy();

 // 보스 등장
 if(kills>0 && kills%50===0 && !enemies.some(e=>e.isBoss)){
  spawnBoss();
 }

 // 총알 이동
 bullets.forEach((b,bi)=>{
  b.y-=10;

  enemies.forEach((e,ei)=>{
   if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){

    // 🔥 크리티컬
    let isCrit = Math.random()<critChance;
    let dmg = isCrit?2:1;

    e.hp-=dmg;

    if(isCrit) playSound(900,'square',0.1);

    bullets.splice(bi,1);

    if(e.hp<=0){

     // 🔥 콤보
     let now=Date.now();
     if(now-lastKillTime<1500) combo++;
     else combo=1;
     lastKillTime=now;

     // 점수
     score += (e.isBoss?2000:100) + combo*10;

     kills++;
     enemies.splice(ei,1);
     playSound(150,'square',0.1);
    }
   }
  });
 });

 // 적 이동 & 공격
 enemies.forEach((e,ei)=>{

  if(e.isBoss){

   // 🔥 보스 AI
   if(e.hp<60) e.phase=2;
   if(e.hp<30) e.phase=3;

   if(e.phase===1){
    e.x += Math.sin(Date.now()/300)*2;
   }
   else if(e.phase===2){
    if(Date.now()-e.lastShoot>800){
     for(let i=-2;i<=2;i++){
      eBullets.push({x:e.x,y:e.y,vx:i*1.5,vy:4});
     }
     e.lastShoot=Date.now();
    }
   }
   else{
    e.x += Math.sin(Date.now()/100)*5;
    if(Date.now()-e.lastShoot>400){
     eBullets.push({
      x:e.x,
      y:e.y,
      vx:(Math.random()-0.5)*4,
      vy:6
     });
     e.lastShoot=Date.now();
    }
   }

  }else{
   e.y+=2;

   // 🔥 공격 강화
   if(Date.now()-e.lastShoot>1200){
    eBullets.push({
     x:e.x,
     y:e.y,
     vx:(Math.random()-0.5)*2,
     vy:5
    });
    e.lastShoot=Date.now();
   }
  }

  if(e.y>800) enemies.splice(ei,1);
 });

 // 적 탄환
 eBullets.forEach((b,bi)=>{
  b.x+=b.vx;
  b.y+=b.vy;

  if(b.y>800) eBullets.splice(bi,1);

  if(
   b.x>player.x-10 &&
   b.x<player.x+10 &&
   b.y>player.y-10 &&
   b.y<player.y+10
  ){
   player.hp-=5;
   eBullets.splice(bi,1);
   playSound(100,'sine',0.1);
  }
 });

 if(player.hp<=0){
  gameOver=true;
  bgMusic.pause();
 }

 // UI
 document.getElementById('stage-txt').innerText=stage;
 document.getElementById('score-txt').innerText=score;
 document.getElementById('combo-txt').innerText=combo;
 document.getElementById('hp-txt').innerText=player.hp;
}

// ===== 그리기 =====
function draw(){
 ctx.clearRect(0,0,480,800);

 // 플레이어
 ctx.fillStyle='cyan';
 ctx.beginPath();
 ctx.moveTo(player.x,player.y-10);
 ctx.lineTo(player.x+10,player.y+10);
 ctx.lineTo(player.x-10,player.y+10);
 ctx.fill();

 // 총알
 ctx.fillStyle='yellow';
 bullets.forEach(b=>{
  ctx.fillRect(b.x,b.y,4,10);
 });

 // 적
 enemies.forEach(e=>{
  ctx.fillStyle=e.isBoss?'red':'green';
  ctx.beginPath();
  ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
  ctx.fill();
 });

 // 적탄
 ctx.fillStyle='orange';
 eBullets.forEach(b=>{
  ctx.beginPath();
  ctx.arc(b.x,b.y,4,0,Math.PI*2);
  ctx.fill();
 });

 // 게임오버
 if(gameOver){
  ctx.fillStyle='white';
  ctx.font='30px Arial';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER',240,400);
 }
}

// ===== 루프 =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
